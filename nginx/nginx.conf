# This sits in front of everything — routes traffic to correct service
#crud-dd-task-mean-app/frontend/nginx.conf
events {}

http {
    server {
        listen 80;

        # Angular frontend
        location / {
            proxy_pass http://frontend:80;
        }

        # Backend API
        location /api {
            proxy_pass http://backend:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}